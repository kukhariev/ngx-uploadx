<div id="page">
  <header>
    <nav>
      <span (click)="menuIsHidden = !menuIsHidden" [class.hidden]="menuIsHidden" id="menu">
        <a href="" title="Select demo...">≡</a>
        <ng-container *ngTemplateOutlet="LinksTemplate"> </ng-container>
      </span>
    </nav>
    <span id="logo">
      <a href="#" title="Click to reload...">ngx-uploadx</a>
    </span>
    <span id="gh">
      <a
        href="https://github.com/kukhariev/ngx-uploadx"
        title="ngx-uploadx homepage..."
        rel="noopener noreferrer"
        target="_blank"
      ></a
    ></span>
  </header>
  <div id="content">
    <aside id="sidebar">
      <ng-container *ngTemplateOutlet="LinksTemplate"> </ng-container>
    </aside>
    <main id="main" (click)="menuIsHidden = true"><router-outlet></router-outlet></main>
  </div>
</div>

<ng-template #LinksTemplate>
  <div class="links">
    <span>Select demo:</span>
    <a routerLink="/simple-upload" routerLinkActive="active">simple-upload</a>
    <a routerLink="/uploadx-advanced" routerLinkActive="active">uploadx-advanced</a>
    <a routerLink="/s3-upload" routerLinkActive="active">s3-upload</a>
    <a routerLink="/onpush-service" routerLinkActive="active">onpush-service</a>
    <a routerLink="/multi-files-directive" routerLinkActive="active">multi-files-directive</a>
    <a routerLink="/multi-instances" routerLinkActive="active">multi-instances</a>
    <a routerLink="/tus" routerLinkActive="active">tus</a>
    <span></span>
    <span>Tools:</span>
    <a routerLink="/file-generator" routerLinkActive="active">Generate test files</a>
  </div>
</ng-template>
