<div uploadxDrop class="upload-zone">
  <div class="uploads-table">
    @for (item of uploads$ | async; track item.uploadId) {
      <div class="row">
        <span>{{ item.name }}</span>
        <span>{{ item.progress }}%</span>
        <span>{{ item.status }}</span>
        <span>
          <button (click)="item.status = 'paused'">pause</button>
          <button (click)="item.status = 'queue'">upload</button>
        </span>
      </div>
    }
  </div>
  <div class="control">
    <span>
      <em>Drop files to upload, or</em>
      <label accesskey="v" for="videos"> <strong>BROWSE</strong></label>
      <input accept="video/*" id="videos" type="file" uploadx />
    </span>
    <span>
      <button (click)="uploadAll()">Upload All</button>
      <button (click)="pauseAll()">Pause All</button>
      <button (click)="cancelAll()">Cancel All</button>
    </span>
  </div>
</div>
