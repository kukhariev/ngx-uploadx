name: ci-tests
on:
  push:
  workflow_dispatch:

jobs:
  ci:
    name: CI Pipeline
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test
        env:
          CI: true

      - name: End-to-end tests
        run: |
          npx playwright install chromium 
          npx playwright test -c e2e/e2e.config.ts
        env:
          CI: true

      - name: Build package
        run: npm run build:pkg
